<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>EA2: Regression mit FFNN</title>
  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  
  <!-- Optional: Chart.js für Plots -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>EA2: Regression mit FFNN <p class="author">von Konstantin Königshofen</p></h1>


<body>
    
    <h2>Next Word Prediction (LSTM)</h2>
    
    <div class="card">
        <div id="status">⏳ Lade Modell und Wörterbuch...</div>
        
        <p style="font-size: 0.9em; color: #555;">
            <strong>Anleitung:</strong> Gib einen Text ein und klicke auf "Vorhersage", um die wahrscheinlichsten nächsten Wörter zu sehen. 
        </p>

        <textarea id="inputText" placeholder="Schreibe hier deinen Text..."></textarea>
        
        <div class="button-group">
            <button class="btn-primary" id="btnVorhersage" disabled>I1) Vorhersage</button>
            <button class="btn-success" id="btnWeiter" disabled>I2) Weiter</button>
            <button class="btn-warning" id="btnAuto" disabled>I3) Auto</button>
            <button class="btn-danger" id="btnStopp" disabled>I3) Stopp</button>
            <button class="btn-secondary" id="btnReset">I4) Reset</button>
        </div>
    </div>

    <div class="card" id="outputArea" style="display: none;">
        <h3>Mögliche nächste Wörter:</h3>
        <div id="predictionsList"></div>
    </div>


    <script src="script.js"></script>

</body>
